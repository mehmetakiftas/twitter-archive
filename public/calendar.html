<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - Twitter Archive</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="calendar.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1><a href="index.html" class="logo-link">Archive</a></h1>
                <button class="sidebar-toggle" id="sidebarToggle">☰</button>
            </div>
            
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <span class="nav-icon">🐦</span>
                    <span>All Tweets</span>
                </a>
                <a href="#" class="nav-item active">
                    <span class="nav-icon">📅</span>
                    <span>Calendar</span>
                </a>
            </nav>

            <div class="sidebar-section">
                <h3>Stats</h3>
                <div id="statsPanel" class="stats-panel"></div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
                <h2 class="page-title">Tweet Calendar</h2>
            </header>

            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prevMonth" class="btn-nav">← Previous</button>
                    <h2 id="currentMonth"></h2>
                    <button id="nextMonth" class="btn-nav">Next →</button>
                </div>

                <div class="calendar-grid">
                    <div class="calendar-day-header">Sun</div>
                    <div class="calendar-day-header">Mon</div>
                    <div class="calendar-day-header">Tue</div>
                    <div class="calendar-day-header">Wed</div>
                    <div class="calendar-day-header">Thu</div>
                    <div class="calendar-day-header">Fri</div>
                    <div class="calendar-day-header">Sat</div>
                </div>

                <div id="calendarDays" class="calendar-days"></div>
            </div>

            <div id="dayPanel" class="day-panel">
                <div class="day-panel-header">
                    <h3 id="selectedDate"></h3>
                    <button id="closeDayPanel" class="btn-close">×</button>
                </div>
                <div id="dayTweets" class="day-tweets"></div>
            </div>
        </main>
    </div>

    <script type="module" src="calendar.js"></script>
</body>
</html>
